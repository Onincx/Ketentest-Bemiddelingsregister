<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord aanmaken — Ketentest Bemiddelingsregister</title>
  <link rel="stylesheet" href="css/style.css?v=20">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/tabler-icons.min.css" rel="stylesheet">
</head>
<body>
  <!-- ZIN Header -->
  <div style="background:#fff; padding:12px 0; border-bottom:1px solid #e5e7eb;">
    <div style="display:flex; justify-content:center; align-items:center; gap:14px;">
      <!-- Rijksoverheid leeuw -->
      <svg width="36" height="48" viewBox="0 0 36 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 0C18 0 6 6 6 18C6 24 8 28 10 31L6 36H10L12 33C13.9 34.6 16 35.6 18 36C20 35.6 22.1 34.6 24 33L26 36H30L26 31C28 28 30 24 30 18C30 6 18 0 18 0Z" fill="#154273"/>
        <path d="M14 20C14 20 13 22 13 24C13 26 14.5 27.5 16 28L15 31H18H21L20 28C21.5 27.5 23 26 23 24C23 22 22 20 22 20" fill="#154273"/>
        <path d="M15 15C15 13.3 16.3 12 18 12C19.7 12 21 13.3 21 15C21 16.7 19.7 18 18 18C16.3 18 15 16.7 15 15Z" fill="#154273"/>
        <path d="M10 14L12 16M26 14L24 16" stroke="#154273" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 20H12M24 20H28" stroke="#154273" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div style="text-align:left;">
        <div style="font-size:13px; font-weight:700; color:#154273; letter-spacing:0.01em;">Zorginstituut Nederland</div>
        <div style="font-size:11px; color:#39870c; font-weight:600;">Ketentest Bemiddelingsregister</div>
      </div>
    </div>
  </div>


  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L3 6V10C3 13.87 6.13 17.5 10 18.5C13.87 17.5 17 13.87 17 10V6L10 2Z" fill="white" fill-opacity="0.9"/>
            <path d="M7 10L9 12L13 8" stroke="#1a3a5c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="login-logo-text">
          <h2>Bemiddelingsregister</h2>
          <p>Ketentest platform</p>
        </div>
      </div>

      <div id="formWrap">
        <h1 style="font-size:20px; margin-bottom:6px;">Wachtwoord aanmaken</h1>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Kies een wachtwoord om je account te activeren.</p>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
          <label for="password">Nieuw wachtwoord</label>
          <input type="password" id="password" placeholder="Minimaal 8 tekens">
        </div>
        <div class="form-group">
          <label for="password2">Herhaal wachtwoord</label>
          <input type="password" id="password2" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="saveBtn" onclick="savePassword()" style="width:100%; justify-content:center; padding:11px;">
          Wachtwoord opslaan en inloggen
        </button>
      </div>

      <div id="successWrap" style="display:none; text-align:center;">
        <i class="ti ti-circle-check" style="font-size:48px; color:var(--accent); display:block; margin-bottom:12px;"></i>
        <h2 style="font-size:18px; margin-bottom:8px;">Account geactiveerd</h2>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Je wordt doorgestuurd naar de applicatie...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=20"></script>
  <script>
    // Supabase verwerkt de token automatisch uit de URL hash bij het laden
    async function savePassword() {
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      hideAlert();

      if (password.length < 8) {
        showAlert('Wachtwoord moet minimaal 8 tekens bevatten.'); return;
      }
      if (password !== password2) {
        showAlert('Wachtwoorden komen niet overeen.'); return;
      }

      const btn = document.getElementById('saveBtn');
      btn.innerHTML = '<span class="spinner"></span> Opslaan...';
      btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        showAlert('Er ging iets mis. De uitnodigingslink is mogelijk verlopen. Vraag de beheerder om een nieuwe uitnodiging.');
        btn.innerHTML = 'Wachtwoord opslaan en inloggen'; btn.disabled = false;
        return;
      }

      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successWrap').style.display = 'block';

      setTimeout(async () => {
        const profile = await getUserProfile((await getCurrentUser()).id);
        window.location.href = profile?.role === 'admin' ? 'admin.html' : 'app.html';
      }, 2000);
    }
  </script>
</body>
</html>
