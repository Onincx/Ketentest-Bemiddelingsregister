<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wachtwoord aanmaken — Ketentest Bemiddelingsregister</title>
  <link rel="stylesheet" href="css/style.css?v=29">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/tabler-icons.min.css" rel="stylesheet">
</head>
<body>
  <!-- ZIN Header -->
  <div style="background:#ffffff;">
    <img src="ZinBanner.png" alt="Zorginstituut Nederland" style="width:100%; max-width:960px; display:block; margin:0 auto;">
  </div>
  <style>
    .topnav { background: #39870c !important; }
    .topnav-logo { color: #fff !important; }
    .topnav a { color: rgba(255,255,255,0.85) !important; }
    .topnav a:hover, .topnav a.active { color: #fff !important; }
    .topnav a.active { border-bottom-color: #fff !important; }
    .login-page { background: linear-gradient(135deg, #2d6e09 0%, #39870c 100%) !important; }
    .login-logo-icon { background: #39870c !important; }
    .login-logo-text h2 { color: #39870c !important; }
    .btn-primary { background: #39870c !important; border-color: #39870c !important; }
    .btn-primary:hover { background: #2d6e09 !important; border-color: #2d6e09 !important; }
    input:focus { border-color: #39870c !important; box-shadow: 0 0 0 3px rgba(57,135,12,0.15) !important; }
  </style>


  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2L3 6V10C3 13.87 6.13 17.5 10 18.5C13.87 17.5 17 13.87 17 10V6L10 2Z" fill="white" fill-opacity="0.9"/>
            <path d="M7 10L9 12L13 8" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="login-logo-text">
          <h2>Bemiddelingsregister</h2>
          <p>Ketentest platform</p>
        </div>
      </div>

      <div id="formWrap">
        <h1 style="font-size:20px; margin-bottom:6px;">Kies een eigen wachtwoord</h1>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Je bent ingelogd met een tijdelijk wachtwoord. Stel hieronder je eigen wachtwoord in om verder te gaan — het tijdelijke wachtwoord werkt daarna niet meer.</p>

        <div id="alert" class="alert alert-error" style="display:none;"></div>

        <div class="form-group">
          <label for="password">Nieuw wachtwoord</label>
          <input type="password" id="password" placeholder="Minimaal 8 tekens">
        </div>
        <div class="form-group">
          <label for="password2">Herhaal wachtwoord</label>
          <input type="password" id="password2" placeholder="••••••••">
        </div>

        <button class="btn btn-primary" id="saveBtn" onclick="savePassword()" style="width:100%; justify-content:center; padding:11px;">
          Wachtwoord opslaan en inloggen
        </button>
      </div>

      <div id="successWrap" style="display:none; text-align:center;">
        <i class="ti ti-circle-check" style="font-size:48px; color:var(--accent); display:block; margin-bottom:12px;"></i>
        <h2 style="font-size:18px; margin-bottom:8px;">Account geactiveerd</h2>
        <p style="color:var(--text-muted); font-size:14px; margin-bottom:20px;">Je wordt doorgestuurd naar de applicatie...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=29"></script>
  <script>
    // Supabase verwerkt de token automatisch uit de URL hash bij het laden
    async function savePassword() {
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      hideAlert();

      if (password.length < 8) {
        showAlert('Wachtwoord moet minimaal 8 tekens bevatten.'); return;
      }
      if (password !== password2) {
        showAlert('Wachtwoorden komen niet overeen.'); return;
      }

      const btn = document.getElementById('saveBtn');
      btn.innerHTML = '<span class="spinner"></span> Opslaan...';
      btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        showAlert('Er ging iets mis. De uitnodigingslink is mogelijk verlopen. Vraag de beheerder om een nieuwe uitnodiging.');
        btn.innerHTML = 'Wachtwoord opslaan en inloggen'; btn.disabled = false;
        return;
      }

      // Verplichte wachtwoordwijziging is hiermee voltooid: het tijdelijke
      // wachtwoord werkt vanaf nu niet meer (overschreven), en de gebruiker
      // hoeft dit scherm niet meer te zien.
      const currentUser = await getCurrentUser();
      if (currentUser) {
        await sb.from('users').update({ must_change_password: false, activated: true }).eq('id', currentUser.id);
      }

      document.getElementById('formWrap').style.display = 'none';
      document.getElementById('successWrap').style.display = 'block';

      setTimeout(async () => {
        const profile = await getUserProfile((await getCurrentUser()).id);
        window.location.href = profile?.role === 'admin' ? 'admin.html' : 'app.html';
      }, 2000);
    }
  </script>
</body>
</html>
