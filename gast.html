<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ketentest — Alleen-lezen overzicht</title>
  <link rel="stylesheet" href="css/style.css?v=22">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .topnav { background: #39870c !important; }
    .topnav-logo { color: #fff !important; }
    .guest-banner { background: #fef3c7; border-bottom: 1px solid #fcd34d; padding: 8px 24px; text-align: center; font-size: 13px; color: #92400e; }
    .scenario-grid { margin-bottom: 24px; }
    .scenario-grid-inner { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .scenario-tile { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; cursor: pointer; transition: box-shadow 0.15s; }
    .scenario-tile:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); }
    .scenario-tile.status-ok { border-left: 3px solid #16a34a; }
    .scenario-tile.status-nok { border-left: 3px solid #dc2626; }
    .scenario-tile.status-open { border-left: 3px solid #e5e7eb; }
    .tile-code { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .tile-title { font-size: 13px; font-weight: 600; color: var(--text); margin: 8px 0; line-height: 1.4; }
    .tile-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; display: flex; gap: 1px; margin-bottom: 8px; }
    .tile-bar-ok { background: #16a34a; border-radius: 99px; }
    .tile-bar-nok { background: #dc2626; border-radius: 99px; }
    .tile-counts { display: flex; gap: 8px; font-size: 11px; font-weight: 500; }
    .detail-panel { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 4px; overflow: hidden; }
    .activity-row-guest { display: grid; grid-template-columns: 32px 110px 1fr 110px 100px; gap: 0; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; align-items: center; }
    .activity-row-guest:last-child { border-bottom: none; }
    .activity-header-guest { display: grid; grid-template-columns: 32px 110px 1fr 110px 100px; gap: 0; padding: 8px 12px; background: var(--surface); font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .org-pill { background: var(--brand-light); color: var(--brand); border-radius: 99px; padding: 2px 9px; font-size: 11px; font-weight: 600; }
    .result-pill { border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 700; display: inline-block; }
    .result-ok { background: #dcfce7; color: #15803d; }
    .result-nok { background: #fee2e2; color: #dc2626; }
    .result-open { background: #f3f4f6; color: #6b7280; }
  </style>
</head>
<body>
  <!-- ZIN Header -->
  <div style="background:#ffffff;">
    <img src="ZinBanner.png" alt="Zorginstituut Nederland" style="width:100%; max-width:960px; display:block; margin:0 auto;">
  </div>

  <nav class="topnav">
    <div class="topnav-logo">
      <div class="logo-dot"></div>
      <span id="navKetentestNaam">Ketentest</span>
    </div>
    <a href="#" id="flowGuestLink" style="color:rgba(255,255,255,0.85); font-size:14px; font-weight:500; margin-left:24px; display:flex; align-items:center; gap:6px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Bekijk Flow
    </a>
  </nav>

  <div class="guest-banner">
    U bekijkt deze ketentest via een deellink, zonder in te loggen. Dit overzicht is alleen-lezen.
  </div>

  <div class="page-wrap">
    <div id="loadingState" class="empty-state" style="padding:60px 20px;">
      <p>Laden...</p>
    </div>

    <div id="errorState" style="display:none;" class="empty-state">
      <p style="font-size:14px; color:var(--text-muted);">Deze link is niet (meer) geldig. Vraag de beheerder om een nieuwe deellink.</p>
    </div>

    <div id="contentState" style="display:none;">
      <div class="stats-grid" style="margin-bottom:24px;">
        <div class="stat-card"><div class="stat-label">Scenario's</div><div class="stat-value" id="statScenarios">0</div></div>
        <div class="stat-card"><div class="stat-label">Activiteiten</div><div class="stat-value" id="statActivities">0</div></div>
        <div class="stat-card"><div class="stat-label">Geslaagd</div><div class="stat-value green" id="statOk">0</div></div>
        <div class="stat-card"><div class="stat-label">Mislukt</div><div class="stat-value red" id="statNok">0</div></div>
      </div>

      <div id="scenarioGrid" class="scenario-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js?v=28"></script>
  <script>
    let guestScenarios = [], guestActivities = [], guestResults = {};
    let guestFlowNodes = [], guestFlowEdges = [];
    let openScenarioId = null;

    function getQueryToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    (async () => {
      const token = getQueryToken();
      if (!token) { showError(); return; }

      const { data, error } = await sb.rpc('get_guest_ketentest_data', { p_token: token });

      if (error || !data || data.error) {
        showError();
        return;
      }

      document.getElementById('navKetentestNaam').textContent = data.ketentest?.naam || 'Ketentest';
      document.title = `${data.ketentest?.naam || 'Ketentest'} — Alleen-lezen overzicht`;
      document.getElementById('flowGuestLink').href = `flow-gast.html?token=${encodeURIComponent(token)}`;

      guestScenarios = data.scenarios || [];
      guestActivities = data.activities || [];
      guestFlowNodes = data.flow_nodes || [];
      guestFlowEdges = data.flow_edges || [];
      guestResults = {};
      (data.results || []).forEach(r => { guestResults[r.activity_id] = r; });

      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('contentState').style.display = '';
      renderAll();
    })();

    function showError() {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = '';
    }

    function getResult(activityId) {
      return guestResults[activityId]?.result || 'open';
    }

    function getScenarioStatus(scenarioId) {
      const acts = guestActivities.filter(a => a.scenario_id === scenarioId);
      if (!acts.length) return 'open';
      const statuses = acts.map(a => getResult(a.id));
      if (statuses.every(s => s === 'ok')) return 'ok';
      if (statuses.some(s => s === 'nok')) return 'nok';
      return 'open';
    }

    // Clientnaam = code van het scenario dat in dezelfde flow als "start"
    // is gemarkeerd. Zit een scenario niet in een flow (of is er geen start
    // gemarkeerd), dan is de clientnaam gewoon de eigen scenariocode.
    function getClientnaam(scenarioId) {
      const node = guestFlowNodes.find(n => n.scenario_id === scenarioId);
      const s = guestScenarios.find(x => x.id === scenarioId);
      if (!node || !node.flow_id) return s?.code || '';

      const startNode = guestFlowNodes.find(n => n.flow_id === node.flow_id && n.is_start);
      if (!startNode) return s?.code || '';

      const startScenario = guestScenarios.find(x => x.id === startNode.scenario_id);
      return startScenario?.code || s?.code || '';
    }

    function isInFlow(scenarioId) {
      return guestFlowNodes.some(n => n.scenario_id === scenarioId && n.flow_id);
    }

    function renderAll() {
      const totalActs = guestActivities.length;
      const ok = Object.values(guestResults).filter(r => r.result === 'ok').length;
      const nok = Object.values(guestResults).filter(r => r.result === 'nok').length;

      document.getElementById('statScenarios').textContent = guestScenarios.length;
      document.getElementById('statActivities').textContent = totalActs;
      document.getElementById('statOk').textContent = ok;
      document.getElementById('statNok').textContent = nok;

      const grid = document.getElementById('scenarioGrid');
      const tilesHtml = guestScenarios.map(s => {
        const acts = guestActivities.filter(a => a.scenario_id === s.id);
        const status = getScenarioStatus(s.id);
        const nTotal = acts.length;
        const nOk = acts.filter(a => getResult(a.id) === 'ok').length;
        const nNok = acts.filter(a => getResult(a.id) === 'nok').length;
        const statusLabel = { ok: 'Geslaagd', nok: 'Mislukt', open: 'Open' }[status];

        return `<div class="scenario-tile status-${status}" id="gs-${s.id}" onclick="toggleGuestScenario('${s.id}', event)">
          <div style="display:flex; justify-content:space-between; align-items:flex-start;">
            <span class="tile-code">${s.code}</span>
            <span class="badge badge-${status}">${statusLabel}</span>
          </div>
          <div class="tile-title">${s.title}</div>
          <div class="tile-bar">
            ${nOk  > 0 ? `<div class="tile-bar-ok" style="width:${Math.round(nOk/nTotal*100)}%"></div>` : ''}
            ${nNok > 0 ? `<div class="tile-bar-nok" style="width:${Math.round(nNok/nTotal*100)}%"></div>` : ''}
          </div>
          <div class="tile-counts">
            <span style="color:var(--text-muted);">${nTotal} act.</span>
            ${nOk  > 0 ? `<span style="color:#16a34a;">✓${nOk}</span>` : ''}
            ${nNok > 0 ? `<span style="color:#dc2626;">✗${nNok}</span>` : ''}
          </div>
        </div>`;
      }).join('');

      // Wrap in een binnenste grid zodat detailpanelen grid-column: 1/-1 kunnen gebruiken
      grid.innerHTML = `<div class="scenario-grid-inner" id="scenarioGridInner">${tilesHtml}</div>`;
    }

    function toggleGuestScenario(id) {
      // Sluit een eventueel al openstaand paneel
      const existing = document.getElementById('detail-' + (openScenarioId || ''));
      if (existing) existing.remove();
      document.querySelectorAll('.scenario-tile').forEach(t => { t.style.outline = ''; });

      if (openScenarioId === id) { openScenarioId = null; return; }
      openScenarioId = id;

      const tile = document.getElementById('gs-' + id);
      if (tile) tile.style.outline = '2px solid var(--brand-mid)';

      const s = guestScenarios.find(x => x.id === id);
      const acts = guestActivities.filter(a => a.scenario_id === id).sort((a, b) => a.sort_order - b.sort_order);

      const panel = document.createElement('div');
      panel.id = 'detail-' + id;
      panel.className = 'detail-panel';
      panel.style.cssText = 'grid-column: 1 / -1; background:var(--white); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:4px;';
      panel.innerHTML = `
        <div style="padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--surface);">
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="font-size:12px; font-weight:700; color:var(--text-muted);">${s.code}</span>
            <strong style="font-size:15px;">${s.title}</strong>
          </div>
          <button onclick="toggleGuestScenario('${id}')" style="border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--text-muted);font-size:13px;padding:4px 10px;border-radius:var(--radius);">✕ Sluiten</button>
        </div>
        <div style="padding:0 20px 16px; overflow-x:auto;">
          <div style="display:flex; gap:12px; align-items:center; margin:12px 0 4px; flex-wrap:wrap;">
            <div style="display:flex; align-items:center; gap:6px;">
              <span style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.04em;">Clientnaam</span>
              <span style="font-size:13px; font-weight:700; color:#154273; background:#e8f0fb; border-radius:4px; padding:2px 8px; font-family:monospace;">${getClientnaam(s.id)}</span>
            </div>
            ${isInFlow(s.id) ? `<div style="display:flex; align-items:center; gap:5px; background:#eaf3e0; border:1px solid #39870c33; border-radius:99px; padding:2px 10px;" title="Dit scenario is onderdeel van een flow">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#39870c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              <span style="font-size:11px; font-weight:600; color:#39870c;">Onderdeel van flow</span>
            </div>` : ''}
          </div>
          ${s.description ? `<p style="font-size:13px; color:var(--text-muted); margin:8px 0;">${s.description}</p>` : ''}
          ${(s.gegeven || s.wanneer) ? `
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:16px 0; padding:16px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border);">
              ${s.gegeven ? `<div><p style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;">Gegeven</p><p style="font-size:13px; line-height:1.7; white-space:pre-wrap;">${s.gegeven}</p></div>` : ''}
              ${s.wanneer ? `<div><p style="font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;">Wanneer</p><p style="font-size:13px; line-height:1.7; white-space:pre-wrap;">${s.wanneer}</p></div>` : ''}
            </div>` : ''}
          ${acts.length ? `
            <div style="border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-top:12px;">
              <div class="activity-header-guest">
                <div>#</div><div>Verantw. org.</div><div>Omschrijving</div><div>Acceptant</div><div>Resultaat</div>
              </div>
              ${acts.map(a => {
                const res = getResult(a.id);
                const resLabel = { ok: 'Geslaagd', nok: 'Mislukt', open: 'Open' }[res];
                return `<div class="activity-row-guest">
                  <div style="color:var(--text-muted);">${a.sort_order}</div>
                  <div>${a.organisation_name ? `<span class="org-pill">${a.organisation_code || a.organisation_name}</span>` : '—'}</div>
                  <div>${a.description}</div>
                  <div>${a.acceptant_name ? `<span class="org-pill" style="background:#fef3c7;color:#92400e;">${a.acceptant_code || a.acceptant_name}</span>` : '—'}</div>
                  <div><span class="result-pill result-${res}">${resLabel}</span></div>
                </div>`;
              }).join('')}
            </div>
          ` : '<p style="font-size:13px; color:var(--text-muted); font-style:italic; padding:12px 0;">Nog geen activiteiten.</p>'}
        </div>`;

      // Voeg het paneel in direct na de laatste tegel in dezelfde visuele rij,
      // zodat het de volledige breedte van het scherm gebruikt.
      const innerGrid = document.getElementById('scenarioGridInner');
      if (!innerGrid) { document.getElementById('scenarioGrid').appendChild(panel); return; }

      const tiles = [...innerGrid.querySelectorAll('.scenario-tile')];
      const tileIndex = tiles.indexOf(tile);
      const tileRect = tile.getBoundingClientRect();
      const tileTop = Math.round(tileRect.top);

      let lastInRow = tile;
      for (let i = tileIndex + 1; i < tiles.length; i++) {
        const r = tiles[i].getBoundingClientRect();
        if (Math.round(r.top) === tileTop) lastInRow = tiles[i];
        else break;
      }

      lastInRow.insertAdjacentElement('afterend', panel);

      setTimeout(() => tile.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  </script>
</body>
</html>
